<style>
:root{
    --bg:#111;
    --text:#fff;
    --overlay: rgba(0,0,0,0.45);
    --card:#fff;
    --accent:#ccc;
}

/* ☀️ modo claro */
body.light{
    --bg:#f5f5f5;
    --text:#111;
    --overlay: rgba(0,0,0,0.25);
    --card:#fff;
    --accent:#777;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
}

/* ================= NAV ================= */
.nav{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%) translateY(-20px);
    width:90%;
    max-width:600px;
    background:rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    border-radius:30px;
    padding:10px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:100;

    opacity:0;
    transition:0.8s ease;
}

.nav.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
}

body.light .nav{
    background:rgba(255,255,255,0.6);
}

.nav img{ width:100px; }

.nav-right{
    display:flex;
    gap:15px;
    align-items:center;
}

/* ================= ICONO TEMA ================= */
.theme{
    width:26px;
    height:26px;
    cursor:pointer;
    display:flex;
}

.theme svg{
    width:100%;
    height:100%;
    fill:var(--text);
    transition:0.3s;
}

/* ================= WRAPPER ================= */
.wrapper{
    padding:100px 15px 40px;
}

/* MARCO COMPLETO */
.carousel-box{
    border-radius:25px;
    overflow:hidden;
    background:var(--card);
}

/* ================= CAROUSEL ================= */
.carousel{
    position:relative;
    height:85vh;
    overflow:hidden;
}

.slides{
    display:flex;
    height:100%;
    transition:transform 0.7s ease;
}

.slide{
    min-width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
}

/* overlay */
.carousel::after{
    content:"";
    position:absolute;
    inset:0;
    background:var(--overlay);
}

/* ================= CENTER ================= */
.center{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
    text-align:center;

    opacity:0;
    transform:translateY(20px);
    transition:1s ease;
}

.center.show{
    opacity:1;
    transform:translateY(0);
}

.center img{
    width:180px;
    margin-bottom:20px;
}

.slogan{
    font-size:18px;
    color:#ddd;
}

/* ================= BOTONES ================= */
.btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:40px;
    height:40px;
    border-radius:50%;
    border:none;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(5px);
    color:white;
    font-size:18px;
    cursor:pointer;
    z-index:10;
}

.btn-left{ left:15px; }
.btn-right{ right:15px; }

/* ================= DOTS ================= */
.dots{
    position:absolute;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:8px;
    z-index:10;
}

.dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:rgba(255,255,255,0.5);
}

.dot.active{
    background:white;
}

/* ================= FOOTER ================= */
.footer{
    padding:40px 20px;
    text-align:center;

    opacity:0;
    transform:translateY(30px);
    transition:1s ease;
}

.footer.show{
    opacity:1;
    transform:translateY(0);
}

.footer img{ width:100px; }

.footer p{
    color:var(--accent);
}

/* ================= SOCIAL ================= */
.socials{
    margin-top:15px;
    display:flex;
    justify-content:center;
    gap:20px;
}

.socials svg{
    width:24px;
    height:24px;
    fill:var(--accent);
}

/* ================= RESPONSIVE ================= */
@media(min-width:768px){
    .carousel{ height:90vh; }
    .center img{ width:220px; }
}



/* ================= LANG FIX ================= */
.lang{
    position:relative;
    cursor:pointer;
}

/* botón visible */
.lang-current{
    font-size:20px;
}

/* dropdown */
.lang-dropdown{
    position:absolute;
    top:45px;
    right:0;

    display:flex;
    flex-direction:column;
    gap:10px;

    padding:12px;
    border-radius:16px;

    opacity:0;
    pointer-events:none;
    transform:translateY(10px) scale(0.95);
    transition:0.25s;
}

/* estado abierto */
.lang.open .lang-dropdown{
    opacity:1;
    pointer-events:auto;
    transform:translateY(0) scale(1);
}

/* items */
.lang-dropdown div{
    font-size:18px;
    cursor:pointer;
    transition:0.2s;
}

.lang-dropdown div:hover{
    transform:scale(1.2);
}

/* estilos */
body:not(.light) .lang-dropdown{
    background:rgba(20,20,20,0.9);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.08);
}

body.light .lang-dropdown{
    background:#fff;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}
</style>
</head>

<script>
/* ================= CAROUSEL PRO ================= */
const slides = document.getElementById("slides");
let index = 1;

const first = slides.children[0].cloneNode(true);
const last = slides.children[slides.children.length-1].cloneNode(true);

slides.appendChild(first);
slides.insertBefore(last, slides.firstChild);

slides.style.transform="translateX(-100%)";

function move(){
    slides.style.transition="0.7s";
    slides.style.transform=`translateX(-${index*100}%)`;
}

slides.addEventListener("transitionend", ()=>{
    if(index === slides.children.length-1){
        slides.style.transition="none";
        index=1;
        slides.style.transform="translateX(-100%)";
    }
});

/* auto */
setInterval(()=>{
    index++;
    move();
},5000);

/* ================= ANIMACIONES ================= */
window.onload=()=>{
    setTimeout(()=>center.classList.add("show"),500);
    setTimeout(()=>nav.classList.add("show"),1200);
};

const observer = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
        if(e.isIntersecting) e.target.classList.add("show");
    });
});
observer.observe(footer);

/* ================= TEMA ================= */
const themeBtn=document.getElementById("theme");

function renderIcon(){
    themeBtn.innerHTML = document.body.classList.contains("light")
    ? `<svg viewBox="0 0 24 24"><path d="M6 12a6 6 0 1112 0 6 6 0 01-12 0z"/></svg>`
    : `<svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z"/></svg>`;
}

if(localStorage.getItem("theme")==="light"){
    document.body.classList.add("light");
}

renderIcon();

themeBtn.onclick=()=>{
    document.body.classList.toggle("light");
    localStorage.setItem("theme",
        document.body.classList.contains("light")?"light":"dark"
    );
    renderIcon();
};



/* ================= MAPA ================= */

// Coordenadas Mercado Valdivia
const lat = -39.812949;
const lng = -73.247813;
// Crear mapa
const map = L.map('map').setView([lat, lng], 26);

// Tiles modo claro
const lightMap = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png');

// Tiles modo oscuro (Carto)
const darkMap = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');

// detectar tema
function loadMapTheme(){
    if(document.body.classList.contains("light")){
        map.removeLayer(darkMap);
        lightMap.addTo(map);
    }else{
        map.removeLayer(lightMap);
        darkMap.addTo(map);
    }
}

loadMapTheme();

// marcador con tu logo
const icon = L.icon({
    iconUrl: 'logo/logo-mercado-valdivia.svg',
    iconSize: [50,50],
    iconAnchor: [25,50]
});

L.marker([lat, lng], {icon}).addTo(map)
.bindPopup("Mercado Valdivia 1911");

// actualizar cuando cambie tema
themeBtn.addEventListener("click", ()=>{
    loadMapTheme();
});



</script>

    }

document.addEventListener("DOMContentLoaded", () => {

    const langBox = document.getElementById("lang");
    const langItems = document.querySelectorAll(".lang-dropdown div");

    // abrir / cerrar
    langBox.addEventListener("click", (e)=>{
        e.stopPropagation();
        langBox.classList.toggle("open");
    });

    document.addEventListener("click", ()=>{
        langBox.classList.remove("open");
    });

    langBox.querySelector(".lang-dropdown").addEventListener("click", (e)=>{
        e.stopPropagation();
    });

    let currentLang = localStorage.getItem("lang") || "es";

    function applyLanguage(lang){
        document.querySelectorAll("[data-i18n]").forEach(el=>{
            const key = el.getAttribute("data-i18n");
            if(translations[lang][key]){
                el.textContent = translations[lang][key];
            }
        });

        const flagMap = {
            es: "🇪🇸",
            en: "🇺🇸",
            de: "🇩🇪",
            fr: "🇫🇷"
        };

        document.querySelector(".lang-current").textContent = flagMap[lang];

        localStorage.setItem("lang", lang);
    }

    langItems.forEach(item=>{
        item.addEventListener("click", ()=>{
            const lang = item.dataset.lang;
            applyLanguage(lang);
            langBox.classList.remove("open");
        });
    });

    applyLanguage(currentLang);

});

</script>
