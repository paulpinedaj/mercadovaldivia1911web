<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercado Valdivia 1911</title>

<style>
:root{
    --bg:#111;
    --text:#fff;
    --overlay: rgba(0,0,0,0.45);
    --card:#fff;
    --accent:#ccc;
}

/* ☀️ modo claro */
body.light{
    --bg:#f5f5f5;
    --text:#111;
    --overlay: rgba(0,0,0,0.25);
    --card:#fff;
    --accent:#777;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
}

/* ================= NAV ================= */
.nav{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%) translateY(-20px);
    width:90%;
    max-width:600px;
    background:rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    border-radius:30px;
    padding:10px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:100;

    opacity:0;
    transition:0.8s ease;
}

.nav.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
}

body.light .nav{
    background:rgba(255,255,255,0.6);
}

.nav img{ width:100px; }

.nav-right{
    display:flex;
    gap:15px;
    align-items:center;
}

/* ================= ICONO TEMA ================= */
.theme{
    width:26px;
    height:26px;
    cursor:pointer;
    display:flex;
}

.theme svg{
    width:100%;
    height:100%;
    fill:var(--text);
    transition:0.3s;
}

/* ================= WRAPPER ================= */
.wrapper{
    padding:100px 15px 40px;
}

/* MARCO COMPLETO */
.carousel-box{
    border-radius:25px;
    overflow:hidden;
    background:var(--card);
}

/* ================= CAROUSEL ================= */
.carousel{
    position:relative;
    height:85vh;
    overflow:hidden;
}

.slides{
    display:flex;
    height:100%;
    transition:transform 0.7s ease;
}

.slide{
    min-width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
}

/* overlay */
.carousel::after{
    content:"";
    position:absolute;
    inset:0;
    background:var(--overlay);
}

/* ================= CENTER ================= */
.center{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
    text-align:center;

    opacity:0;
    transform:translateY(20px);
    transition:1s ease;
}

.center.show{
    opacity:1;
    transform:translateY(0);
}

.center img{
    width:180px;
    margin-bottom:20px;
}

.slogan{
    font-size:18px;
    color:#ddd;
}

/* ================= BOTONES ================= */
.btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:40px;
    height:40px;
    border-radius:50%;
    border:none;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(5px);
    color:white;
    font-size:18px;
    cursor:pointer;
    z-index:10;
}

.btn-left{ left:15px; }
.btn-right{ right:15px; }

/* ================= DOTS ================= */
.dots{
    position:absolute;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:8px;
    z-index:10;
}

.dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:rgba(255,255,255,0.5);
}

.dot.active{
    background:white;
}

/* ================= FOOTER ================= */
.footer{
    padding:40px 20px;
    text-align:center;

    opacity:0;
    transform:translateY(30px);
    transition:1s ease;
}

.footer.show{
    opacity:1;
    transform:translateY(0);
}

.footer img{ width:100px; }

.footer p{
    color:var(--accent);
}

/* ================= SOCIAL ================= */
.socials{
    margin-top:15px;
    display:flex;
    justify-content:center;
    gap:20px;
}

.socials svg{
    width:24px;
    height:24px;
    fill:var(--accent);
}

/* ================= RESPONSIVE ================= */
@media(min-width:768px){
    .carousel{ height:90vh; }
    .center img{ width:220px; }
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav" id="nav">
    <img src="logo/logo-mercado-valdivia.svg">

    <div class="nav-right">
        <div class="theme" id="theme"></div>
        <div>☰</div>
    </div>
</div>

<div class="wrapper">
<div class="carousel-box">
<div class="carousel">

<div class="slides" id="slides">
    <div class="slide" style="background-image:url('img/wall-1.JPG')"></div>
    <div class="slide" style="background-image:url('img/wall-2.jpg')"></div>
    <div class="slide" style="background-image:url('img/wall-3.jpg')"></div>
</div>

<div class="center" id="center">
    <img src="logo/logo-mercado-valdivia.svg">
    <div class="slogan">Tradición, cultura y sabor desde 1911</div>
</div>

<button class="btn btn-left" id="prev">‹</button>
<button class="btn btn-right" id="next">›</button>

<div class="dots" id="dots"></div>

</div>
</div>
</div>

<!-- FOOTER -->
<div class="footer" id="footer">
    <img src="logo/logo-mercado-valdivia.svg">
    <p>Yungay #400, Valdivia, Chile</p>

    <div class="socials">
        <a href="https://www.instagram.com/mercadovaldivia1911/" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M7 2C4 2 2 4 2 7v10c0 3 2 5 5 5h10c3 0 5-2 5-5V7c0-3-2-5-5-5H7zm5 5a5 5 0 110 10 5 5 0 010-10z"/></svg>
         </a>
        <a href="#" target="_blank">

        <svg viewBox="0 0 24 24"><path d="M13 3h4v4h-3v3h3v4h-3v7h-4v-7H7v-4h3V7c0-2 1-4 3-4z"/></svg>
        </a>
    </div>
</div>

<script>
/* ================= CAROUSEL PRO ================= */
const slides = document.getElementById("slides");
let index = 1;

const first = slides.children[0].cloneNode(true);
const last = slides.children[slides.children.length-1].cloneNode(true);

slides.appendChild(first);
slides.insertBefore(last, slides.firstChild);

slides.style.transform="translateX(-100%)";

function move(){
    slides.style.transition="0.7s";
    slides.style.transform=`translateX(-${index*100}%)`;
}

slides.addEventListener("transitionend", ()=>{
    if(index === slides.children.length-1){
        slides.style.transition="none";
        index=1;
        slides.style.transform="translateX(-100%)";
    }
});

/* auto */
setInterval(()=>{
    index++;
    move();
},5000);

/* ================= ANIMACIONES ================= */
window.onload=()=>{
    setTimeout(()=>center.classList.add("show"),500);
    setTimeout(()=>nav.classList.add("show"),1200);
};

const observer = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
        if(e.isIntersecting) e.target.classList.add("show");
    });
});
observer.observe(footer);

/* ================= TEMA ================= */
const themeBtn=document.getElementById("theme");

function renderIcon(){
    themeBtn.innerHTML = document.body.classList.contains("light")
    ? `<svg viewBox="0 0 24 24"><path d="M6 12a6 6 0 1112 0 6 6 0 01-12 0z"/></svg>`
    : `<svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z"/></svg>`;
}

if(localStorage.getItem("theme")==="light"){
    document.body.classList.add("light");
}

renderIcon();

themeBtn.onclick=()=>{
    document.body.classList.toggle("light");
    localStorage.setItem("theme",
        document.body.classList.contains("light")?"light":"dark"
    );
    renderIcon();
};
</script>

</body>
</html>
